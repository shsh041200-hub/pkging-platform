<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title-box-sizes desc-box-sizes">
  <title id="title-box-sizes">이사박스 사이즈 비교도 (1호~7호)</title>
  <desc id="desc-box-sizes">이사박스 1호부터 7호까지의 정면 크기를 비교하는 기술 다이어그램. 각 호수별 가로x세로x높이 치수를 표기합니다.</desc>

  <rect width="800" height="440" fill="#F8FAFC" rx="8"/>

  <text x="400" y="36" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">이사박스 사이즈 비교도 (1호~7호)</text>
  <text x="400" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#64748B">단위: mm (가로 x 세로 x 높이) | 시중 유통 기준 참고치</text>

  <line x1="20" y1="350" x2="780" y2="350" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- 1호 (300x200x200) h=94px w=42px top=256 -->
  <g transform="translate(24, 0)">
    <rect x="0" y="256" width="42" height="94" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="270" x2="42" y2="270" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="21" y="310" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">1호</text>
    <text x="21" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">300x200</text>
    <text x="21" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x200</text>
    <line x1="-8" y1="256" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="256" x2="-4" y2="256" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 2호 (400x300x250) h=118px w=52px top=232 -->
  <g transform="translate(114, 0)">
    <rect x="0" y="232" width="52" height="118" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="248" x2="52" y2="248" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="26" y="298" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">2호</text>
    <text x="26" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">400x300</text>
    <text x="26" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x250</text>
    <line x1="-8" y1="232" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="232" x2="-4" y2="232" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 3호 (500x350x350) h=165px w=64px top=185 — 인기 사이즈 -->
  <g transform="translate(214, 0)">
    <rect x="0" y="185" width="64" height="165" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="203" x2="64" y2="203" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="32" y="278" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">3호</text>
    <rect x="6" y="296" width="52" height="18" fill="#FFF7ED" stroke="#F97316" stroke-width="0.75" rx="9"/>
    <text x="32" y="308" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#C2410C">인기 사이즈</text>
    <text x="32" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">500x350</text>
    <text x="32" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x350</text>
    <line x1="-8" y1="185" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="185" x2="-4" y2="185" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 4호 (560x380x380) h=179px w=72px top=171 -->
  <g transform="translate(326, 0)">
    <rect x="0" y="171" width="72" height="179" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="191" x2="72" y2="191" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="36" y="270" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">4호</text>
    <text x="36" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">560x380</text>
    <text x="36" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x380</text>
    <line x1="-8" y1="171" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="171" x2="-4" y2="171" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 5호 (620x430x430) h=203px w=80px top=147 -->
  <g transform="translate(446, 0)">
    <rect x="0" y="147" width="80" height="203" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="169" x2="80" y2="169" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="40" y="258" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">5호</text>
    <text x="40" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">620x430</text>
    <text x="40" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x430</text>
    <line x1="-8" y1="147" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="147" x2="-4" y2="147" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 6호 (700x470x470) h=222px w=90px top=128 -->
  <g transform="translate(574, 0)">
    <rect x="0" y="128" width="90" height="222" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="150" x2="90" y2="150" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="45" y="250" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">6호</text>
    <text x="45" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">700x470</text>
    <text x="45" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x470</text>
    <line x1="-8" y1="128" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="128" x2="-4" y2="128" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- 7호 (800x550x500) h=236px w=100px top=114 -->
  <g transform="translate(700, 0)">
    <rect x="0" y="114" width="80" height="236" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="2"/>
    <line x1="0" y1="138" x2="80" y2="138" stroke="#0F172A" stroke-width="0.75" stroke-dasharray="4,3"/>
    <text x="40" y="240" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">7호</text>
    <text x="40" y="372" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">800x550</text>
    <text x="40" y="383" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8.5" fill="#334155">x500</text>
    <line x1="-8" y1="114" x2="-8" y2="350" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="114" x2="-4" y2="114" stroke="#F97316" stroke-width="1"/>
    <line x1="-12" y1="350" x2="-4" y2="350" stroke="#F97316" stroke-width="1"/>
  </g>

  <!-- Volume labels (리터) -->
  <text x="45" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~12L</text>
  <text x="140" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~30L</text>
  <text x="246" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~60L</text>
  <text x="362" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~80L</text>
  <text x="486" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~120L</text>
  <text x="619" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~160L</text>
  <text x="740" y="403" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="8" fill="#94A3B8">~220L</text>

  <text x="400" y="432" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#94A3B8">※ 비율은 이해를 위한 근사치이며, 실제 치수는 제조사별로 다를 수 있습니다.</text>
</svg>
