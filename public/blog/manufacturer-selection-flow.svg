<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="title-mfg-flow desc-mfg-flow">
  <title id="title-mfg-flow">이사박스 제조사 선정 기준 5단계</title>
  <desc id="desc-mfg-flow">이사박스 제조사를 선정할 때 확인해야 할 5가지 기준을 순서대로 보여주는 프로세스 다이어그램. 전문 생산 여부, 생산 능력, 원자재 수급, 품질 관리, 거래 투명성 순서입니다.</desc>

  <rect width="720" height="280" fill="#F8FAFC" rx="8"/>

  <text x="360" y="32" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0F172A">이사박스 제조사 선정 기준 5단계</text>
  <text x="360" y="48" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">1차 필터링 시 아래 순서로 확인하면 시행착오를 줄일 수 있습니다</text>

  <!-- Step 1 -->
  <g transform="translate(24, 72)">
    <rect x="0" y="0" width="116" height="100" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="8"/>
    <circle cx="58" cy="24" r="14" fill="#0F172A"/>
    <text x="58" y="29" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
    <text x="58" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">전문 생산</text>
    <text x="58" y="68" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">여부</text>
    <text x="58" y="86" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#64748B">이사박스 주력 생산</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="142" y1="122" x2="160" y2="122" stroke="#334155" stroke-width="1.5"/>
  <polygon points="160,118 168,122 160,126" fill="#334155"/>

  <!-- Step 2 -->
  <g transform="translate(168, 72)">
    <rect x="0" y="0" width="116" height="100" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="8"/>
    <circle cx="58" cy="24" r="14" fill="#0F172A"/>
    <text x="58" y="29" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
    <text x="58" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">생산 능력</text>
    <text x="58" y="68" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">(Capacity)</text>
    <text x="58" y="86" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#64748B">월 생산량 + 여력</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="286" y1="122" x2="304" y2="122" stroke="#334155" stroke-width="1.5"/>
  <polygon points="304,118 312,122 304,126" fill="#334155"/>

  <!-- Step 3 -->
  <g transform="translate(312, 72)">
    <rect x="0" y="0" width="116" height="100" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="8"/>
    <circle cx="58" cy="24" r="14" fill="#0F172A"/>
    <text x="58" y="29" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
    <text x="58" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">원자재</text>
    <text x="58" y="68" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">수급 안정성</text>
    <text x="58" y="86" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#64748B">폐지 가격 변동 대응</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="430" y1="122" x2="448" y2="122" stroke="#334155" stroke-width="1.5"/>
  <polygon points="448,118 456,122 448,126" fill="#334155"/>

  <!-- Step 4 -->
  <g transform="translate(456, 72)">
    <rect x="0" y="0" width="116" height="100" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5" rx="8"/>
    <circle cx="58" cy="24" r="14" fill="#0F172A"/>
    <text x="58" y="29" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
    <text x="58" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">품질 관리</text>
    <text x="58" y="68" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">체계</text>
    <text x="58" y="86" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#64748B">BCT 기준 + 샘플 검수</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="574" y1="122" x2="592" y2="122" stroke="#334155" stroke-width="1.5"/>
  <polygon points="592,118 600,122 592,126" fill="#334155"/>

  <!-- Step 5 (highlighted) -->
  <g transform="translate(600, 72)">
    <rect x="0" y="0" width="100" height="100" fill="#FFFFFF" stroke="#F97316" stroke-width="2" rx="8"/>
    <circle cx="50" cy="24" r="14" fill="#F97316"/>
    <text x="50" y="29" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
    <text x="50" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">거래 조건</text>
    <text x="50" y="68" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0F172A">투명성</text>
    <text x="50" y="86" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#64748B">서면 견적 확정</text>
  </g>

  <!-- Bottom tip -->
  <rect x="40" y="196" width="640" height="56" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="8"/>
  <text x="64" y="220" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#C2410C">TIP</text>
  <text x="94" y="220" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">1~2회 샘플 발주를 통해 실물 품질을 직접 확인한 후 본 발주를 결정하세요.</text>
  <text x="94" y="238" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">위 5단계를 기준으로 발굴한 제조사를 채점하면 객관적 비교가 가능합니다.</text>

  <text x="360" y="272" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#94A3B8">※ 단계 순서는 권장 우선순위이며, 상황에 따라 조정 가능합니다.</text>
</svg>
