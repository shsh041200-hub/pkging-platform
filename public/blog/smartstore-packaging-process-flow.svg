<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 190" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">포장 공정 5단계 프로세스 플로우</title>
  <desc id="svg-desc">스마트스토어 셀러를 위한 포장 공정 5단계: 상품 측정, 박스 선택, 완충재 배치, 테이프 봉인, 운송장 부착</desc>

  <defs>
    <style>
      text { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Step 1: 상품 측정 -->
  <g>
    <rect x="40" y="15" width="120" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="100" cy="38" r="13" fill="#F97316"/>
    <text x="100" y="42" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">1</text>
    <g transform="translate(78,58)" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M6,2 L6,42 L44,42"/>
      <line x1="6" y1="12" x2="13" y2="12"/>
      <line x1="6" y1="22" x2="16" y2="22"/>
      <line x1="6" y1="32" x2="13" y2="32"/>
      <line x1="16" y1="42" x2="16" y2="35"/>
      <line x1="26" y1="42" x2="26" y2="37"/>
      <line x1="36" y1="42" x2="36" y2="35"/>
      <line x1="24" y1="6" x2="24" y2="36" stroke="#F97316"/>
      <path d="M21,9 L24,4 L27,9" stroke="#F97316"/>
      <path d="M21,33 L24,38 L27,33" stroke="#F97316"/>
    </g>
    <text x="100" y="140" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="600">상품 측정</text>
    <text x="100" y="155" text-anchor="middle" fill="#64748B" font-size="10">가로×세로×높이</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="164" y1="95" x2="178" y2="95" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M178,90 L186,95 L178,100" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2: 박스 선택 -->
  <g>
    <rect x="190" y="15" width="120" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="250" cy="38" r="13" fill="#F97316"/>
    <text x="250" y="42" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">2</text>
    <g transform="translate(228,58)" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="4" y="14" width="30" height="26" rx="1"/>
      <path d="M4,14 L14,5 L44,5 L34,14"/>
      <path d="M34,14 L44,5 L44,31 L34,40"/>
      <path d="M14,27 L20,33 L32,19" stroke="#F97316" stroke-width="2"/>
    </g>
    <text x="250" y="140" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="600">박스 선택</text>
    <text x="250" y="155" text-anchor="middle" fill="#64748B" font-size="10">적정 사이즈 매칭</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="314" y1="95" x2="328" y2="95" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M328,90 L336,95 L328,100" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3: 완충재 배치 -->
  <g>
    <rect x="340" y="15" width="120" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="400" cy="38" r="13" fill="#F97316"/>
    <text x="400" y="42" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">3</text>
    <g transform="translate(378,58)" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="2" y="4" width="40" height="36" rx="2"/>
      <rect x="15" y="14" width="14" height="18" rx="1"/>
      <circle cx="8" cy="14" r="3" stroke="#F97316" stroke-width="1.2"/>
      <circle cx="8" cy="23" r="3" stroke="#F97316" stroke-width="1.2"/>
      <circle cx="8" cy="32" r="3" stroke="#F97316" stroke-width="1.2"/>
      <circle cx="36" cy="14" r="3" stroke="#F97316" stroke-width="1.2"/>
      <circle cx="36" cy="23" r="3" stroke="#F97316" stroke-width="1.2"/>
      <circle cx="36" cy="32" r="3" stroke="#F97316" stroke-width="1.2"/>
    </g>
    <text x="400" y="140" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="600">완충재 배치</text>
    <text x="400" y="155" text-anchor="middle" fill="#64748B" font-size="10">충격 흡수 배치</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="464" y1="95" x2="478" y2="95" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M478,90 L486,95 L478,100" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 4: 테이프 봉인 -->
  <g>
    <rect x="490" y="15" width="120" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="550" cy="38" r="13" fill="#F97316"/>
    <text x="550" y="42" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">4</text>
    <g transform="translate(528,58)" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="4" y="12" width="36" height="28" rx="1"/>
      <path d="M4,12 L22,4 L40,12"/>
      <rect x="18" y="2" width="8" height="40" rx="1" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1.2"/>
    </g>
    <text x="550" y="140" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="600">테이프 봉인</text>
    <text x="550" y="155" text-anchor="middle" fill="#64748B" font-size="10">H자 테이핑</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="614" y1="95" x2="628" y2="95" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M628,90 L636,95 L628,100" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 5: 운송장 부착 -->
  <g>
    <rect x="640" y="15" width="120" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="700" cy="38" r="13" fill="#F97316"/>
    <text x="700" y="42" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">5</text>
    <g transform="translate(678,58)" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="5" y="2" width="34" height="40" rx="3"/>
      <line x1="12" y1="11" x2="32" y2="11"/>
      <line x1="12" y1="18" x2="27" y2="18"/>
      <g stroke="#F97316" stroke-linecap="round">
        <line x1="12" y1="26" x2="12" y2="36" stroke-width="1"/>
        <line x1="14.5" y1="26" x2="14.5" y2="36" stroke-width="2"/>
        <line x1="17.5" y1="26" x2="17.5" y2="36" stroke-width="1"/>
        <line x1="20" y1="26" x2="20" y2="36" stroke-width="1.5"/>
        <line x1="23" y1="26" x2="23" y2="36" stroke-width="1"/>
        <line x1="25" y1="26" x2="25" y2="36" stroke-width="2"/>
        <line x1="28" y1="26" x2="28" y2="36" stroke-width="1"/>
        <line x1="30.5" y1="26" x2="30.5" y2="36" stroke-width="1.5"/>
        <line x1="32.5" y1="26" x2="32.5" y2="36" stroke-width="1"/>
      </g>
    </g>
    <text x="700" y="140" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="600">운송장 부착</text>
    <text x="700" y="155" text-anchor="middle" fill="#64748B" font-size="10">바코드 확인</text>
  </g>
</svg>
