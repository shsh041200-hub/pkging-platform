<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title-usage desc-usage">
  <title id="title-usage">이사박스 호수별 사용 비율</title>
  <desc id="desc-usage">일반 가정 이사 기준 이사박스 호수별 사용 비율. 3호가 40~50%로 가장 많이 사용되며, 4호 20~30%, 2호 15~20%, 5~7호 5~10% 순입니다.</desc>

  <rect width="720" height="220" fill="#F8FAFC" rx="8"/>

  <text x="360" y="32" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0F172A">일반 가정 이사 — 호수별 사용 비율</text>
  <text x="360" y="48" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">업체별·이사 규모별 상이할 수 있음</text>

  <!-- Segmented bar -->
  <rect x="40" y="68" width="640" height="40" fill="#E2E8F0" rx="6"/>

  <!-- 3호: 45% = 288px -->
  <rect x="40" y="68" width="288" height="40" fill="#F97316" rx="6"/>
  <rect x="322" y="68" width="6" height="40" fill="#F97316"/>
  <!-- 4호: 25% = 160px -->
  <rect x="328" y="68" width="160" height="40" fill="#334155"/>
  <!-- 2호: 17.5% = 112px -->
  <rect x="488" y="68" width="112" height="40" fill="#64748B"/>
  <!-- 5~7호: 7.5% = 48px (rest of remaining space) -->
  <rect x="600" y="68" width="80" height="40" fill="#CBD5E1" rx="0"/>
  <rect x="674" y="68" width="6" height="40" fill="#CBD5E1" rx="6"/>

  <!-- Labels inside bar -->
  <text x="184" y="93" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">3호  40~50%</text>
  <text x="408" y="93" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">4호  20~30%</text>
  <text x="544" y="93" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">2호</text>
  <text x="640" y="93" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">5~7호</text>

  <!-- Legend row -->
  <g transform="translate(40, 130)">
    <!-- 3호 -->
    <rect x="0" y="0" width="12" height="12" fill="#F97316" rx="2"/>
    <text x="16" y="10" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">3호 (40~50%)</text>
    <text x="16" y="24" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">의류, 책, 소형 가전 — 가장 범용적</text>

    <!-- 4호 -->
    <rect x="180" y="0" width="12" height="12" fill="#334155" rx="2"/>
    <text x="196" y="10" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">4호 (20~30%)</text>
    <text x="196" y="24" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">주방용품, 침구류</text>

    <!-- 2호 -->
    <rect x="360" y="0" width="12" height="12" fill="#64748B" rx="2"/>
    <text x="376" y="10" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">2호 (15~20%)</text>
    <text x="376" y="24" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">책, 의류 소포장</text>

    <!-- 5~7호 -->
    <rect x="530" y="0" width="12" height="12" fill="#CBD5E1" rx="2"/>
    <text x="546" y="10" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">5~7호 (5~10%)</text>
    <text x="546" y="24" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">대형 물품, 특수 포장</text>
  </g>

  <text x="360" y="210" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#94A3B8">※ 이사업체 실무 경험 기반 일반적 기준입니다.</text>
</svg>
