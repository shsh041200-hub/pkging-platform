<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="title-channel desc-channel">
  <title id="title-channel">이사박스 구매 채널 비교</title>
  <desc id="desc-channel">제조사 직거래, 도매상, 오픈마켓 세 가지 이사박스 구매 채널을 비교하는 인포그래픽. 최소 발주량, 단가 경쟁력, 납기, 적합 규모를 비교합니다.</desc>

  <!-- Background -->
  <rect width="720" height="480" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">이사박스 구매 채널 비교</text>
  <text x="360" y="54" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#64748B">발주 규모와 빈도에 따라 최적 채널이 달라집니다</text>

  <!-- Column 1: 제조사 직거래 (Highlighted) -->
  <g transform="translate(28, 76)">
    <rect x="0" y="0" width="212" height="370" fill="#FFFFFF" stroke="#F97316" stroke-width="2" rx="8"/>

    <!-- Header -->
    <rect x="0" y="0" width="212" height="56" fill="#0F172A" rx="8"/>
    <rect x="0" y="28" width="212" height="28" fill="#0F172A"/>
    <!-- Factory icon (simple) -->
    <g transform="translate(80, 12)" fill="none" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="12" width="16" height="16" rx="1"/>
      <polygon points="12,4 22,12 2,12"/>
      <rect x="9" y="20" width="6" height="8"/>
    </g>
    <text x="106" y="46" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">제조사 직거래</text>

    <!-- Recommended badge -->
    <rect x="64" y="64" width="84" height="22" fill="#FFF7ED" stroke="#F97316" stroke-width="0.75" rx="11"/>
    <text x="106" y="79" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#C2410C">추천 채널</text>

    <!-- Metrics -->
    <g transform="translate(16, 102)">
      <text x="0" y="0" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">최소 발주량</text>
      <text x="0" y="18" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">500개 이상</text>

      <line x1="0" y1="30" x2="180" y2="30" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="50" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">단가 경쟁력</text>
      <!-- Bar visualization -->
      <rect x="0" y="58" width="180" height="8" fill="#E2E8F0" rx="4"/>
      <rect x="0" y="58" width="162" height="8" fill="#F97316" rx="4"/>
      <text x="0" y="80" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">매우 높음</text>

      <line x1="0" y1="92" x2="180" y2="92" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="112" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">납기</text>
      <text x="0" y="130" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">7~14일</text>

      <line x1="0" y1="142" x2="180" y2="142" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="162" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">적합 규모</text>
      <text x="0" y="180" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">대량 정기 발주</text>
      <text x="0" y="196" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#334155">월 500개+ 반복 주문</text>

      <line x1="0" y1="210" x2="180" y2="210" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="230" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">특장점</text>
      <text x="0" y="248" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">커스터마이징 가능</text>
      <text x="0" y="264" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">장기 단가 협상 유리</text>
    </g>
  </g>

  <!-- Column 2: 도매상 -->
  <g transform="translate(254, 76)">
    <rect x="0" y="0" width="212" height="370" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" rx="8"/>

    <!-- Header -->
    <rect x="0" y="0" width="212" height="56" fill="#0F172A" rx="8"/>
    <rect x="0" y="28" width="212" height="28" fill="#0F172A"/>
    <!-- Store icon -->
    <g transform="translate(80, 12)" fill="none" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="14" width="20" height="14" rx="1"/>
      <polyline points="2,14 12,6 22,14"/>
      <rect x="8" y="20" width="8" height="8"/>
    </g>
    <text x="106" y="46" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">포장재 도매상</text>

    <!-- Metrics -->
    <g transform="translate(16, 102)">
      <text x="0" y="0" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">최소 발주량</text>
      <text x="0" y="18" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">50~200개</text>

      <line x1="0" y1="30" x2="180" y2="30" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="50" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">단가 경쟁력</text>
      <rect x="0" y="58" width="180" height="8" fill="#E2E8F0" rx="4"/>
      <rect x="0" y="58" width="108" height="8" fill="#334155" rx="4"/>
      <text x="0" y="80" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">보통</text>

      <line x1="0" y1="92" x2="180" y2="92" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="112" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">납기</text>
      <text x="0" y="130" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">1~3일</text>

      <line x1="0" y1="142" x2="180" y2="142" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="162" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">적합 규모</text>
      <text x="0" y="180" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">소량·혼합 발주</text>
      <text x="0" y="196" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#334155">사이즈별 혼합 주문</text>

      <line x1="0" y1="210" x2="180" y2="210" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="230" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">특장점</text>
      <text x="0" y="248" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">급발주 대응 가능</text>
      <text x="0" y="264" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">공급사 다변화 용이</text>
    </g>
  </g>

  <!-- Column 3: 오픈마켓 -->
  <g transform="translate(480, 76)">
    <rect x="0" y="0" width="212" height="370" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" rx="8"/>

    <!-- Header -->
    <rect x="0" y="0" width="212" height="56" fill="#0F172A" rx="8"/>
    <rect x="0" y="28" width="212" height="28" fill="#0F172A"/>
    <!-- Cart icon -->
    <g transform="translate(80, 12)" fill="none" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4,8 L8,8 L11,22 L21,22"/>
      <circle cx="12" cy="26" r="2"/>
      <circle cx="20" cy="26" r="2"/>
      <path d="M8,8 L10,18 L22,18 L24,10 L8,10"/>
    </g>
    <text x="106" y="46" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">오픈마켓</text>

    <!-- Metrics -->
    <g transform="translate(16, 102)">
      <text x="0" y="0" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">최소 발주량</text>
      <text x="0" y="18" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">1개부터</text>

      <line x1="0" y1="30" x2="180" y2="30" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="50" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">단가 경쟁력</text>
      <rect x="0" y="58" width="180" height="8" fill="#E2E8F0" rx="4"/>
      <rect x="0" y="58" width="54" height="8" fill="#94A3B8" rx="4"/>
      <text x="0" y="80" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0F172A">낮음</text>

      <line x1="0" y1="92" x2="180" y2="92" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="112" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">납기</text>
      <text x="0" y="130" font-family="Pretendard, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0F172A">1~2일</text>

      <line x1="0" y1="142" x2="180" y2="142" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="162" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">적합 규모</text>
      <text x="0" y="180" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0F172A">소량 단건 구매</text>
      <text x="0" y="196" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#334155">개인·소규모 사업자</text>

      <line x1="0" y1="210" x2="180" y2="210" stroke="#E2E8F0" stroke-width="1"/>

      <text x="0" y="230" font-family="Pretendard, -apple-system, sans-serif" font-size="10" fill="#64748B">특장점</text>
      <text x="0" y="248" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">접근성 높음</text>
      <text x="0" y="264" font-family="Pretendard, -apple-system, sans-serif" font-size="11" fill="#334155">리뷰 기반 선택 가능</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="360" y="466" text-anchor="middle" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="#94A3B8">출처: Packlinx 시장 조사 (2026) | 실제 조건은 업체별로 상이합니다</text>
</svg>