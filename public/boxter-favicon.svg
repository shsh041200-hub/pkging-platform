<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="BOXTER favicon">
  <title>BOXTER</title>
  <!-- Concept #10 — Modular Grid (light tone) -->
  <rect width="32" height="32" rx="7" fill="#F1F5F9"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#E2E8F0"/>
  <!-- Row 1 -->
  <rect x="6" y="6" width="11" height="8" rx="1" fill="none" stroke="#94A3B8" stroke-width="1.2"/>
  <rect x="19" y="6" width="7" height="8" rx="1" fill="#CBD5E1"/>
  <!-- Row 2 -->
  <rect x="6" y="16" width="7" height="10" rx="1" fill="#94A3B8"/>
  <rect x="15" y="16" width="5" height="10" rx="1" fill="none" stroke="#94A3B8" stroke-width="1.2"/>
  <rect x="22" y="16" width="4" height="10" rx="1" fill="#0A0F1E"/>
</svg>
