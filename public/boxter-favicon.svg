<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="BOXTER favicon">
  <title>BOXTER</title>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1B3A5C"/>

  <!-- Box icon centered in 32x32 -->
  <!-- Box body -->
  <rect x="6" y="14" width="20" height="14" rx="1.5" fill="#FFFFFF"/>

  <!-- Box lid: left panel -->
  <path d="M6 14 L16 8 L16 14 Z" fill="#E2E8F0"/>

  <!-- Box lid: right panel -->
  <path d="M26 14 L16 8 L16 14 Z" fill="#CBD5E1"/>

  <!-- Orange tape stripe -->
  <rect x="6" y="18.5" width="20" height="3.5" fill="#F97316"/>

  <!-- Fold line highlight -->
  <line x1="16" y1="8" x2="16" y2="14" stroke="#F97316" stroke-width="1.5" stroke-linecap="round"/>
</svg>
